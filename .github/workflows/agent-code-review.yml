name: Agent — code review on agent PRs

# REVIEWER (event-driven, no cron). When the executor (agent-resolve-issue.yml)
# opens a PR, this runs an independent Opus 4.8 pass over the diff and leaves a
# GitHub review (comment-only — it never approves or merges). A human still
# makes the final call.
#
# Scoped to `agent-authored` PRs so it doesn't review unrelated human PRs.
# allowed_bots: "claude" is required because the executor opens its PR as
# `claude[bot]`, so this pull_request event is bot-initiated and would
# otherwise hit claude-code-action's anti-loop guard.
#
# Why a separate reviewer instead of trusting the executor: the agent that
# wrote the change is the worst judge of it. A fresh model with no memory of
# the implementation, reading only the diff against the issue, catches what
# the author rationalized away.

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

concurrency:
  group: agent-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'agent-authored')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, pdo_sqlite, sqlite3, mbstring, xml, curl, dom, zip
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Write settings.php
        run: |
          cp web/sites/default/default.settings.php web/sites/default/settings.php
          chmod u+w web/sites/default web/sites/default/settings.php
          printf "\n\$settings['config_sync_directory'] = '../config/sync';\n" \
            >> web/sites/default/settings.php

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          allowed_bots: "claude"
          claude_args: |
            --model claude-opus-4-8
            --max-turns 40
            --allowedTools "Bash(git:*),Bash(gh pr:*),Bash(gh issue:*),Bash(composer:*),Bash(php:*),Bash(./vendor/bin/drush:*),Read,Glob,Grep,LS"
          prompt: |
            You are an independent code reviewer for this PR. You did NOT write
            this change — review it skeptically, as if a colleague handed it to
            you. Read CLAUDE.md first to understand the project's conventions.

            This is a Drupal 11 config-as-code project. There is no database in
            git: the site's entire structure is YAML under `config/sync/`. The
            PR was opened by the automated executor to resolve a labeled issue;
            the PR body references the issue with `Fixes #<n>`.

            Steps:
            1. Read the PR diff (`gh pr diff`) and the linked issue
               (`gh issue view <n>`) so you know what it was supposed to do.
            2. Check, concretely:
               - **Completeness of the config set.** This is where Drupal config
                 PRs actually fail. A new field is NOT done unless all of these
                 exist: `field.storage.node.field_x.yml`,
                 `field.field.node.<bundle>.field_x.yml`, an entry in
                 `core.entity_form_display.node.<bundle>.default.yml`, and an
                 entry in `core.entity_view_display.node.<bundle>.default.yml`.
                 A field missing from the form display is invisible to editors
                 even though it imports cleanly. Verify each one by name.
               - **Correctness**: does it do what the issue asked, with the
                 field types, cardinality, required flags, and allowed values
                 the issue specified? Check the actual YAML values, not the PR
                 description's claims about them.
               - **Scope**: `drush config:export` rewrites everything it
                 touches. Are there config files in the diff unrelated to this
                 issue? Flag them.
               - **Conventions**: English user-facing labels/descriptions,
                 ASCII `snake_case` machine names, `field_` prefix on fields,
                 no duplicate field storage for a concept that already has one.
               - **The build**: run the same gate CI runs and report the result
                 explicitly in your review:
                 `./vendor/bin/drush site:install --existing-config --db-url=sqlite://sites/default/files/.ht.sqlite --yes`
                 then `./vendor/bin/drush config:status`.
            3. Leave ONE GitHub PR review via `gh pr review <n>`:
               - Use `--request-changes` if you found a real correctness,
                 completeness, or scope problem; otherwise `--comment`. NEVER
                 `--approve` (a human approves) and never merge.
               - In the body: a short verdict, then specific findings with file
                 paths. If it's clean, say so plainly and concisely — do not
                 invent nitpicks.

            Do NOT edit code or push commits — you are reviewing only. If the
            author should change something, describe it in the review and the
            executor can address it when the human asks.
